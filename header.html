<header class="site-header">
  <a href="/" class="site-name">
    <span class="site-name-main">HALINA COX</span>
    <span class="site-name-sub">HEALTH &amp; FITNESS</span>
  </a>
  
  <!-- Hamburger menu button (only shows on mobile) -->
  <button class="mobile-menu-toggle" aria-label="Toggle menu" id="menuToggle">
    <span></span>
    <span></span>
    <span></span>
  </button>
  
  <!-- Navigation wrapper -->
  <div class="nav-wrapper" id="navWrapper">
    <nav>
      <ul class="nav-menu">
        <li><a href="/">HOME</a></li>
        <li><a href="/about">ABOUT</a></li>
        <li><a href="/coaching">COACHING</a></li>
<li><a href="/work_with_me" class="nav-cta">WORK WITH ME</a></li>
      </ul>
    </nav>
  </div>
</header>

<script>
(function() {
  // Use a timeout to ensure DOM is ready
  setTimeout(function() {
    const menuToggle = document.getElementById('menuToggle');
    const navWrapper = document.getElementById('navWrapper');
    
    if (menuToggle) {
      menuToggle.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('Menu clicked!'); // Debug log
        this.classList.toggle('active');
        if (navWrapper) {
          navWrapper.classList.toggle('active');
        }
      });
    }
    
    // Close menu when clicking a link
    if (navWrapper) {
      navWrapper.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') {
          menuToggle.classList.remove('active');
          navWrapper.classList.remove('active');
        }
      });
    }
  }, 100);
})();
</script>
