<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work With Me - Halina Cox Fit</title>
    
    <!-- Global styles for header/footer -->
    <link rel="stylesheet" href="/styles.css" />
    
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="/work_with_me/work_with_me.css" />
  </head>
  <body>
    <!-- Include header -->
    <div id="header-placeholder"></div>

    <main>
      <section class="work-contact">
        <div class="work-contact-card">
          <h1 class="work-contact-title">Work With Me</h1>
          <p class="work-contact-subtitle" style="font-style: italic; font-family: 'Times New Roman', Times, serif;">
            Let's get started on your health journey!
          </p>
          <p style="line-height: 1.3;">
            Please fill out the form below to apply for 1:1 coaching.<br>
            I can't wait to learn more about you!
          </p>

          <form
            class="contact-form"
            action="https://formspree.io/f/xzdyrydq"
            method="POST"
          >
            <div class="field-row">
              <div class="field">
                <label for="first_name">First Name</label>
                <input
                  id="first_name"
                  name="first_name"
                  type="text"
                  required
                />
              </div>
              <div class="field">
                <label for="last_name">Last Name</label>
                <input
                  id="last_name"
                  name="last_name"
                  type="text"
                  required
                />
              </div>
            </div>

            <div class="field-row">
              <div class="field">
                <label for="email">Email</label>
                <input 
                  id="email" 
                  name="email" 
                  type="email" 
                  required 
                />
              </div>
            </div>

            <div class="field">
              <label for="phone">Phone Number</label>
              <input
                id="phone"
                name="phone"
                type="tel"
              />
            </div>

            <div class="field">
              <label for="goals">What are your main health and wellness goals?</label>
              <textarea
                id="goals"
                name="goals"
                rows="4"
                required
              ></textarea>
            </div>

            <div class="field">
              <label for="why">Why are you interested in working with me?</label>
              <textarea
                id="why"
                name="why"
                rows="4"
                required
              ></textarea>
            </div>

            <div class="field">
              <label for="other">Anything else you'd like me to know?</label>
              <textarea
                id="other"
                name="other"
                rows="4"
              ></textarea>
            </div>

            <button type="submit" class="contact-submit">SEND MESSAGE</button>
          </form>
        </div>
      </section>
    </main>

    <!-- Include footer -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript to load header and footer -->
    <script>
      // Load header
      fetch('/header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        });

      // Load footer
      fetch('/footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        });

      // Pre-select dropdown based on URL parameter
      window.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const service = urlParams.get('service');
        const dropdown = document.getElementById('project');
        
        if (service && dropdown) {
          dropdown.value = service;
        }
      });
    </script>
    <script src="/menu.js"></script>
  </body>
</html>
