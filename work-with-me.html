<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work With Me - Halina Cox</title>
    <link rel="stylesheet" href="portfolio.css" />
    <link rel="stylesheet" href="work-with-me.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="./home.html" class="site-name">HALINA COX</a>
      <nav>
        <ul class="nav-menu">
          <li><a href="./home.html">HOME</a></li>
          <li><a href="./about.html">ABOUT</a></li>
          <li><a href="./experience.html">EXPERIENCE</a></li>
          <li><a href="./portfolio.html">PORTFOLIO</a></li>
          <li><a href="./work-with-me.html" class="nav-cta">WORK WITH ME</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="work-contact">
        <div class="work-contact-card">
          <h1 class="work-contact-title">Work With Me</h1>
          <p class="work-contact-subtitle">
            Have a project in mind? Send me a note and I'll get back to you soon.
          </p>

          <form
            class="contact-form"
            action="https://formspree.io/f/xeezbdkl"
            method="POST"
          >
            <div class="field-row">
              <div class="field">
                <label for="name">Name</label>
                <input 
                  id="name" 
                  name="name" 
                  type="text" 
                  placeholder="Your name" 
                  required 
                />
              </div>
              <div class="field">
                <label for="email">Email</label>
                <input 
                  id="email" 
                  name="email" 
                  type="email" 
                  placeholder="you@example.com" 
                  required 
                />
              </div>
            </div>

            <div class="field">
              <label for="project">Project Type</label>
              <select id="project" name="project_type" required>
                <option value="">Select one</option>
                <option value="website-design">Website Design</option>
                <option value="frontend-dev">Frontend Development</option>
                <option value="fullstack">Full-Stack Build</option>
                <option value="consulting">Consulting</option>
              </select>
            </div>

            <div class="field">
              <label for="message">Project Details</label>
              <textarea 
                id="message" 
                name="message" 
                rows="6" 
                placeholder="Tell me about your project..." 
                required
              ></textarea>
            </div>

            <button type="submit" class="contact-submit">SEND MESSAGE</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <a href="https://www.linkedin.com/in/halinacox" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <img src="images/linkedin.svg" alt="LinkedIn" />
        </a>
        <a href="https://github.com/HalinaCox" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <img src="images/github.svg" alt="GitHub" />
        </a>
      </div>
    </footer>
  </body>
</html>
