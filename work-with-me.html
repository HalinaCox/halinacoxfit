<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work With Me - Halina Cox</title>
    
    <!-- Global styles for header/footer -->
    <link rel="stylesheet" href="styles.css" />
    
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="work-with-me.css" />
  </head>
  <body class="marble-bg">
    <!-- Include header -->
    <div id="header-placeholder"></div>

    <main>
      <section class="work-contact">
        <div class="work-contact-card">
          <h1 class="work-contact-title">Work With Me</h1>
          <p class="work-contact-subtitle">
            Have a project in mind? Send me a note and I'll get back to you soon.
          </p>

          <form
            class="contact-form"
            action="https://formspree.io/f/xeezbdkl"
            method="POST"
          >
            <div class="field-row">
              <div class="field">
                <label for="name">Name</label>
                <input 
                  id="name" 
                  name="name" 
                  type="text" 
                  placeholder="Your name" 
                  required 
                />
              </div>
              <div class="field">
                <label for="email">Email</label>
                <input 
                  id="email" 
                  name="email" 
                  type="email" 
                  placeholder="you@example.com" 
                  required 
                />
              </div>
            </div>

            <div class="field">
              <label for="project">Project Type</label>
              <select id="project" name="project_type" required>
                <option value="">Select one</option>
                <option value="website">Website Development</option>
                <option value="event">Event Planning & Strategy</option>
                <option value="career">Career Transition Coaching</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="field">
              <label for="message">Project Details</label>
              <textarea 
                id="message" 
                name="message" 
                rows="6" 
                placeholder="Tell me about your project..." 
                required
              ></textarea>
            </div>

            <button type="submit" class="contact-submit">SEND MESSAGE</button>
          </form>
        </div>
      </section>
    </main>

    <!-- Include footer -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript to load header and footer -->
    <script>
      // Load header
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        });

      // Load footer
      fetch('footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        });

      // Pre-select dropdown based on URL parameter
      window.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const service = urlParams.get('service');
        const dropdown = document.getElementById('project');
        
        if (service && dropdown) {
          dropdown.value = service;
        }
      });
    </script>
    <script>
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        });
        
      fetch('footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        });
    </script>
    <script src="menu.js"></script>
  </body>
</html>
