<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Halina Cox</title>
    <link rel="stylesheet" href="/styles.css"/>
    <link rel="stylesheet" href="/index.css"/>
    <link rel="icon" href="/images/favicon.png">
    <link rel="apple-touch-icon" href="/images/favicon.png">
  </head>
  <body>
    <div id="header-placeholder"></div>
    <main>
      <section class="hero">
         <div class="hero-frame">
          <img
            class="hero-img"
            src="/images/home-img.jpg"
            alt="Halina Cox headshot"
          />
        </div>
      </section>
      <section class="content">
        <div class="me">
          <p>
            Hi! I'm Halina — a <strong>software engineer and web developer</strong> helping 
            <strong>small businesses, founders, and personal brands</strong> build a thoughtful 
            online presence. With a background as a full-stack engineer at Cisco Meraki, I bring 
            real technical depth and personal attention to every project.
          </p>
        </div>
      </section>
      <div class="bottom-cta">
        <a href="/about" class="about-cta">MORE ABOUT ME</a>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script>
      fetch('/header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        });
      fetch('/footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        });
    </script>
    <script src="/menu.js"></script>
  </body>
</html>
